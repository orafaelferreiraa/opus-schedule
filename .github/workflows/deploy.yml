name: deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      EXPECTED_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
      FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}
      APP_SERVICE_PLAN_NAME: ${{ vars.APP_SERVICE_PLAN_NAME }}
      APPLICATION_INSIGHTS_NAME: ${{ vars.APPLICATION_INSIGHTS_NAME }}
      STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Azure Login (OIDC)
        id: azure_login_oidc
        continue-on-error: true
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Azure Login (Service Principal secret fallback)
        id: azure_login_sp
        if: steps.azure_login_oidc.outcome == 'failure' && env.AZURE_CREDENTIALS != ''
        continue-on-error: true
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Fail when Azure auth is not configured
        if: >-
          steps.azure_login_oidc.outcome == 'failure' &&
          (
            env.AZURE_CREDENTIALS == '' ||
            steps.azure_login_sp.outcome == 'failure'
          )
        run: |
          echo "Azure authentication failed in terraform-apply."
          echo "Configure OIDC federated credential in Entra ID or set AZURE_CREDENTIALS secret."
          exit 1

      - name: Create diagnostics folder
        run: mkdir -p ../ci-artifacts

      - name: Assert subscription context
        run: |
          CURRENT_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          echo "Expected subscription: ${EXPECTED_SUBSCRIPTION_ID}"
          echo "Current subscription:  ${CURRENT_SUBSCRIPTION_ID}"
          if [ "${CURRENT_SUBSCRIPTION_ID}" != "${EXPECTED_SUBSCRIPTION_ID}" ]; then
            echo "Azure login landed in the wrong subscription context."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        run: terraform init

      - name: Import existing Function App when needed
        run: |
          set -euo pipefail
          TF_ADDR="azurerm_linux_function_app.lowopscast"
          if terraform state list | grep -q "^${TF_ADDR}$"; then
            echo "${TF_ADDR} already present in Terraform state."
            exit 0
          fi

          FUNC_APP_NAME="${FUNCTION_APP_NAME:-func-lowopscast-prod}"
          RG_NAME="${RESOURCE_GROUP_NAME:-rg-jsearch}"
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RESOURCE_ID="/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Web/sites/${FUNC_APP_NAME}"

          if az resource show --ids "${RESOURCE_ID}" >/dev/null 2>&1; then
            echo "Existing Function App found in Azure. Importing into Terraform state..."
            terraform import "${TF_ADDR}" "${RESOURCE_ID}"
          else
            echo "Function App does not exist in Azure yet. Terraform apply will create it."
          fi

      - name: Terraform apply
        run: |
          RG_NAME="${RESOURCE_GROUP_NAME:-rg-jsearch}"
          PLAN_NAME="${APP_SERVICE_PLAN_NAME:-plan-jobfinder-prod}"
          APPI_NAME="${APPLICATION_INSIGHTS_NAME:-appi-jobfinder-prod}"
          ST_NAME="${STORAGE_ACCOUNT_NAME:-stjobfinderprodrandonix}"
          KV_NAME="${KEY_VAULT_NAME:-kv-jf-prod-randonix}"
          FUNC_APP_NAME="${FUNCTION_APP_NAME:-func-lowopscast-prod}"

          set +e
          terraform apply -no-color -auto-approve \
            -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var "resource_group_name=${RG_NAME}" \
            -var "function_app_name=${FUNC_APP_NAME}" \
            -var "app_service_plan_name=${PLAN_NAME}" \
            -var "application_insights_name=${APPI_NAME}" \
            -var "storage_account_name=${ST_NAME}" \
            -var "key_vault_name=${KV_NAME}" \
            2>&1 | tee ../ci-artifacts/terraform-apply.log
          TF_APPLY_EXIT=${PIPESTATUS[0]}
          echo "Terraform apply exit code: ${TF_APPLY_EXIT}"

          if [ "${TF_APPLY_EXIT}" -ne 0 ]; then
            terraform state list > ../ci-artifacts/terraform-state-list-on-failure.txt 2>&1 || true
            terraform plan -no-color \
              -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
              -var "resource_group_name=${RG_NAME}" \
              -var "function_app_name=${FUNC_APP_NAME}" \
              -var "app_service_plan_name=${PLAN_NAME}" \
              -var "application_insights_name=${APPI_NAME}" \
              -var "storage_account_name=${ST_NAME}" \
              -var "key_vault_name=${KV_NAME}" \
              > ../ci-artifacts/terraform-plan-after-apply-failure.log 2>&1 || true
          fi

          exit ${TF_APPLY_EXIT}

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-diagnostics-${{ github.run_id }}
          path: infra/ci-artifacts
          if-no-files-found: warn

  deploy-function:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [terraform-apply]
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      EXPECTED_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Azure Login (OIDC)
        id: azure_login_oidc
        continue-on-error: true
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Azure Login (Service Principal secret fallback)
        id: azure_login_sp
        if: steps.azure_login_oidc.outcome == 'failure' && env.AZURE_CREDENTIALS != ''
        continue-on-error: true
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Fail when Azure auth is not configured
        if: >-
          steps.azure_login_oidc.outcome == 'failure' &&
          (
            env.AZURE_CREDENTIALS == '' ||
            steps.azure_login_sp.outcome == 'failure'
          )
        run: |
          echo "Azure authentication failed in deploy-function."
          echo "Configure OIDC federated credential in Entra ID or set AZURE_CREDENTIALS secret."
          exit 1

      - name: Assert subscription context
        run: |
          CURRENT_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          echo "Expected subscription: ${EXPECTED_SUBSCRIPTION_ID}"
          echo "Current subscription:  ${CURRENT_SUBSCRIPTION_ID}"
          if [ "${CURRENT_SUBSCRIPTION_ID}" != "${EXPECTED_SUBSCRIPTION_ID}" ]; then
            echo "Azure login landed in the wrong subscription context."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Create diagnostics folder
        run: mkdir -p ../infra/ci-artifacts

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Publish Function App
        run: |
          FUNC_APP_NAME="${FUNCTION_APP_NAME:-func-lowopscast-prod}"
          set +e
          func azure functionapp publish "${FUNC_APP_NAME}" --python 2>&1 | tee ../infra/ci-artifacts/function-publish.log
          FUNC_EXIT=${PIPESTATUS[0]}
          echo "Function publish exit code: ${FUNC_EXIT}"
          exit ${FUNC_EXIT}

      - name: Upload deploy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: function-deploy-diagnostics-${{ github.run_id }}
          path: infra/ci-artifacts
          if-no-files-found: warn
