name: deploy

on:
  workflow_run:
    workflows: ["ci-validate"]
    types: [completed]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  terraform-apply:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      function_app_name: ${{ steps.tf_output.outputs.function_app_name }}
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      EXPECTED_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ vars.RESOURCE_GROUP_NAME }}
      FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}
      APP_SERVICE_PLAN_NAME: ${{ vars.APP_SERVICE_PLAN_NAME }}
      APP_SERVICE_PLAN_SKU: ${{ vars.APP_SERVICE_PLAN_SKU }}
      APPLICATION_INSIGHTS_NAME: ${{ vars.APPLICATION_INSIGHTS_NAME }}
      STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure Login (OIDC)
        id: azure_login_oidc
        continue-on-error: true
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Azure Login (Service Principal secret fallback)
        id: azure_login_sp
        if: steps.azure_login_oidc.outcome == 'failure' && env.AZURE_CREDENTIALS != ''
        continue-on-error: true
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Fail when Azure auth is not configured
        if: >-
          steps.azure_login_oidc.outcome == 'failure' &&
          (
            env.AZURE_CREDENTIALS == '' ||
            steps.azure_login_sp.outcome == 'failure'
          )
        run: |
          echo "Azure authentication failed in terraform-apply."
          echo "Configure OIDC federated credential in Entra ID or set AZURE_CREDENTIALS secret."
          exit 1

      - name: Create diagnostics folder
        run: mkdir -p ../ci-artifacts

      - name: Assert subscription context
        run: |
          CURRENT_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          echo "Expected subscription: ${EXPECTED_SUBSCRIPTION_ID}"
          echo "Current subscription:  ${CURRENT_SUBSCRIPTION_ID}"
          if [ "${CURRENT_SUBSCRIPTION_ID}" != "${EXPECTED_SUBSCRIPTION_ID}" ]; then
            echo "Azure login landed in the wrong subscription context."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: latest

      - name: Terraform init
        run: terraform init

      - name: Import existing resources into Terraform state (if needed)
        run: |
          RG_NAME="${RESOURCE_GROUP_NAME:-rg-lowopscast-schedule}"
          PLAN_NAME="${APP_SERVICE_PLAN_NAME:-plan-lowopscast-schedule}"
          PLAN_SKU="${APP_SERVICE_PLAN_SKU:-B1}"
          APPI_NAME="${APPLICATION_INSIGHTS_NAME:-appi-lowopscast-schedule}"
          ST_NAME="${STORAGE_ACCOUNT_NAME:-}"
          FUNC_APP_NAME="${FUNCTION_APP_NAME:-}"
          SUB_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          RG_ID="/subscriptions/${SUB_ID}/resourceGroups/${RG_NAME}"
          PLAN_ID="${RG_ID}/providers/Microsoft.Web/serverfarms/${PLAN_NAME}"
          APPI_ID="${RG_ID}/providers/Microsoft.Insights/components/${APPI_NAME}"

          if ! terraform state show azurerm_resource_group.core >/dev/null 2>&1; then
            if az group show --name "${RG_NAME}" >/dev/null 2>&1; then
              echo "Importing existing Resource Group: ${RG_NAME}"
              terraform import azurerm_resource_group.core "${RG_ID}" || true
            fi
          fi

          if ! terraform state show azurerm_service_plan.core >/dev/null 2>&1; then
            if az appservice plan show --resource-group "${RG_NAME}" --name "${PLAN_NAME}" >/dev/null 2>&1; then
              echo "Importing existing App Service Plan: ${PLAN_NAME}"
              terraform import azurerm_service_plan.core "${PLAN_ID}" || true
            fi
          fi

          if ! terraform state show azurerm_application_insights.core >/dev/null 2>&1; then
            if az monitor app-insights component show --app "${APPI_NAME}" --resource-group "${RG_NAME}" >/dev/null 2>&1; then
              echo "Importing existing Application Insights: ${APPI_NAME}"
              terraform import azurerm_application_insights.core "${APPI_ID}" || true
            fi
          fi

          if [ -n "${ST_NAME}" ] && ! terraform state show azurerm_storage_account.core >/dev/null 2>&1; then
            if az storage account show --resource-group "${RG_NAME}" --name "${ST_NAME}" >/dev/null 2>&1; then
              echo "Importing existing Storage Account: ${ST_NAME}"
              terraform import azurerm_storage_account.core "/subscriptions/${SUB_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Storage/storageAccounts/${ST_NAME}" || true
            fi
          fi

          if [ -n "${FUNC_APP_NAME}" ] && ! terraform state show azurerm_linux_function_app.lowopscast >/dev/null 2>&1; then
            if az functionapp show --resource-group "${RG_NAME}" --name "${FUNC_APP_NAME}" >/dev/null 2>&1; then
              echo "Importing existing Function App: ${FUNC_APP_NAME}"
              terraform import azurerm_linux_function_app.lowopscast "/subscriptions/${SUB_ID}/resourceGroups/${RG_NAME}/providers/Microsoft.Web/sites/${FUNC_APP_NAME}" || true
            fi
          fi

      - name: Terraform apply
        run: |
          RG_NAME="${RESOURCE_GROUP_NAME:-rg-lowopscast-schedule}"
          PLAN_NAME="${APP_SERVICE_PLAN_NAME:-plan-lowopscast-schedule}"
          APPI_NAME="${APPLICATION_INSIGHTS_NAME:-appi-lowopscast-schedule}"
          ST_NAME="${STORAGE_ACCOUNT_NAME:-}"
          FUNC_APP_NAME="${FUNCTION_APP_NAME:-}"

          TF_ARGS=(
            -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            -var "resource_group_name=${RG_NAME}"
            -var "app_service_plan_name=${PLAN_NAME}"
            -var "app_service_plan_sku=${PLAN_SKU}"
            -var "application_insights_name=${APPI_NAME}"
          )

          if [ -n "${ST_NAME}" ]; then
            TF_ARGS+=( -var "storage_account_name=${ST_NAME}" )
          fi
          if [ -n "${FUNC_APP_NAME}" ]; then
            TF_ARGS+=( -var "function_app_name=${FUNC_APP_NAME}" )
          fi

          set +e
          terraform apply -no-color -auto-approve "${TF_ARGS[@]}" 2>&1 | tee ../ci-artifacts/terraform-apply.log
          TF_APPLY_EXIT=${PIPESTATUS[0]}
          echo "Terraform apply exit code: ${TF_APPLY_EXIT}"

          if [ "${TF_APPLY_EXIT}" -ne 0 ]; then
            terraform state list > ../ci-artifacts/terraform-state-list-on-failure.txt 2>&1 || true
            terraform plan -no-color "${TF_ARGS[@]}" > ../ci-artifacts/terraform-plan-after-apply-failure.log 2>&1 || true
          fi

          exit ${TF_APPLY_EXIT}

      - name: Capture Function App name from Terraform output
        id: tf_output
        run: |
          APP_NAME="$(terraform output -raw function_app_name)"
          echo "function_app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "Function app resolved for deploy: ${APP_NAME}"

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-diagnostics-${{ github.run_id }}
          path: infra/ci-artifacts
          if-no-files-found: warn

  deploy-function:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [terraform-apply]
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      EXPECTED_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      DEPLOY_FUNCTION_APP_NAME: ${{ needs.terraform-apply.outputs.function_app_name }}
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure Login (OIDC)
        id: azure_login_oidc
        continue-on-error: true
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Azure Login (Service Principal secret fallback)
        id: azure_login_sp
        if: steps.azure_login_oidc.outcome == 'failure' && env.AZURE_CREDENTIALS != ''
        continue-on-error: true
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Fail when Azure auth is not configured
        if: >-
          steps.azure_login_oidc.outcome == 'failure' &&
          (
            env.AZURE_CREDENTIALS == '' ||
            steps.azure_login_sp.outcome == 'failure'
          )
        run: |
          echo "Azure authentication failed in deploy-function."
          echo "Configure OIDC federated credential in Entra ID or set AZURE_CREDENTIALS secret."
          exit 1

      - name: Assert subscription context
        run: |
          CURRENT_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          echo "Expected subscription: ${EXPECTED_SUBSCRIPTION_ID}"
          echo "Current subscription:  ${CURRENT_SUBSCRIPTION_ID}"
          if [ "${CURRENT_SUBSCRIPTION_ID}" != "${EXPECTED_SUBSCRIPTION_ID}" ]; then
            echo "Azure login landed in the wrong subscription context."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Create diagnostics folder
        run: mkdir -p ../infra/ci-artifacts

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@latest --unsafe-perm true

      - name: Publish Function App
        run: |
          set +e
          func azure functionapp publish "${DEPLOY_FUNCTION_APP_NAME}" --python 2>&1 | tee ../infra/ci-artifacts/function-publish.log
          FUNC_EXIT=${PIPESTATUS[0]}
          echo "Function publish exit code: ${FUNC_EXIT}"
          exit ${FUNC_EXIT}

      - name: Upload deploy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: function-deploy-diagnostics-${{ github.run_id }}
          path: infra/ci-artifacts
          if-no-files-found: warn
