name: ci-validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q tests/test_function_app.py tests/test_e2e_schedule_existing_clips.py tests/test_judge.py

  terraform-plan:
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 25
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      EXPECTED_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure Login (OIDC)
        id: azure_login_oidc
        continue-on-error: true
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Azure Login (Service Principal secret fallback)
        id: azure_login_sp
        if: steps.azure_login_oidc.outcome == 'failure' && env.AZURE_CREDENTIALS != ''
        continue-on-error: true
        uses: azure/login@v3
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Fail when Azure auth is not configured
        if: >-
          steps.azure_login_oidc.outcome == 'failure' &&
          (
            env.AZURE_CREDENTIALS == '' ||
            steps.azure_login_sp.outcome == 'failure'
          )
        run: |
          echo "Azure authentication failed in terraform-plan."
          echo "Configure OIDC federated credential in Entra ID or set AZURE_CREDENTIALS secret."
          exit 1

      - name: Create diagnostics folder
        run: mkdir -p ../ci-artifacts

      - name: Assert subscription context
        run: |
          CURRENT_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
          echo "Expected subscription: ${EXPECTED_SUBSCRIPTION_ID}"
          echo "Current subscription:  ${CURRENT_SUBSCRIPTION_ID}"
          if [ "${CURRENT_SUBSCRIPTION_ID}" != "${EXPECTED_SUBSCRIPTION_ID}" ]; then
            echo "Azure login landed in the wrong subscription context."
            exit 1
          fi

      - name: Preflight Azure resources
        run: |
          set +e
          RG_NAME="rg-jsearch"
          PLAN_NAME="plan-jobfinder-prod"
          APPI_NAME="appi-jobfinder-prod"
          ST_NAME="stjobfinderprodrandonix"
          KV_NAME="kv-jf-prod-randonix"

          az appservice plan show -g "${RG_NAME}" -n "${PLAN_NAME}" > ../ci-artifacts/preflight-plan.json 2>&1
          PLAN_RC=$?
          az monitor app-insights component show -g "${RG_NAME}" -a "${APPI_NAME}" > ../ci-artifacts/preflight-appi.json 2>&1
          APPI_RC=$?
          az storage account show -g "${RG_NAME}" -n "${ST_NAME}" > ../ci-artifacts/preflight-storage.json 2>&1
          ST_RC=$?
          az keyvault show -g "${RG_NAME}" -n "${KV_NAME}" > ../ci-artifacts/preflight-keyvault.json 2>&1
          KV_RC=$?

          echo "plan=${PLAN_RC} appi=${APPI_RC} storage=${ST_RC} keyvault=${KV_RC}" | tee ../ci-artifacts/preflight-summary.txt

          if [ ${PLAN_RC} -ne 0 ] || [ ${APPI_RC} -ne 0 ] || [ ${ST_RC} -ne 0 ] || [ ${KV_RC} -ne 0 ]; then
            echo "Preflight failed: one or more required Azure resources were not found in the configured subscription/resource group."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform diagnostics
        run: |
          terraform version > ../ci-artifacts/terraform-version-plan.txt
          terraform providers > ../ci-artifacts/terraform-providers-plan.txt

      - name: Terraform fmt
        run: terraform fmt -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          set +e
          terraform plan -no-color -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" 2>&1 | tee ../ci-artifacts/terraform-plan.log
          TF_PLAN_EXIT=${PIPESTATUS[0]}
          echo "Terraform plan exit code: ${TF_PLAN_EXIT}"
          exit ${TF_PLAN_EXIT}

      - name: Upload plan diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-diagnostics-${{ github.run_id }}
          path: infra/ci-artifacts
          if-no-files-found: warn
