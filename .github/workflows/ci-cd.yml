name: ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q tests/test_function_app.py tests/test_e2e_schedule_existing_clips.py tests/test_judge.py

  terraform-plan:
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt
        run: terraform fmt -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Import existing Function App into state (if present)
        run: |
          set -euo pipefail
          if terraform state show azurerm_linux_function_app.lowopscast >/dev/null 2>&1; then
            echo "Function App already tracked in state."
            exit 0
          fi

          FUNCTION_APP_ID=$(az functionapp show \
            --name "func-lowopscast-prod" \
            --resource-group "rg-jsearch" \
            --query id -o tsv 2>/dev/null || true)

          if [ -n "$FUNCTION_APP_ID" ]; then
            echo "Importing existing Function App: $FUNCTION_APP_ID"
            terraform import azurerm_linux_function_app.lowopscast "$FUNCTION_APP_ID"
          else
            echo "Function App not found in Azure. Skipping import."
          fi

      - name: Terraform plan
        run: terraform plan -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

  terraform-apply:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        run: terraform init

      - name: Import existing Function App into state (if present)
        run: |
          set -euo pipefail
          if terraform state show azurerm_linux_function_app.lowopscast >/dev/null 2>&1; then
            echo "Function App already tracked in state."
            exit 0
          fi

          FUNCTION_APP_ID=$(az functionapp show \
            --name "func-lowopscast-prod" \
            --resource-group "rg-jsearch" \
            --query id -o tsv 2>/dev/null || true)

          if [ -n "$FUNCTION_APP_ID" ]; then
            echo "Importing existing Function App: $FUNCTION_APP_ID"
            terraform import azurerm_linux_function_app.lowopscast "$FUNCTION_APP_ID"
          else
            echo "Function App not found in Azure. Skipping import."
          fi

      - name: Terraform apply
        run: terraform apply -auto-approve -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

  deploy-function:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Publish Function App
        run: |
          func azure functionapp publish func-lowopscast-prod --python
